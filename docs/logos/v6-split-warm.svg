<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="accent6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="todaycolor6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#d6d3d1"/>
    </linearGradient>
    <filter id="sh6">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow6">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.2" result="c"/>
      <feComposite in="c" in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="6" y="6" width="348" height="108" rx="16" fill="url(#bg6)" filter="url(#sh6)"/>
  <rect x="6" y="6" width="348" height="108" rx="16" fill="none" stroke="#292524" stroke-width="1"/>

  <!-- Warm accent underline bar -->
  <rect x="30" y="98" width="200" height="3" rx="1.5" fill="url(#accent6)" opacity="0.8"/>

  <!-- Small checkmark ring icon -->
  <circle cx="316" cy="60" r="26" fill="none" stroke="#292524" stroke-width="1.5"/>
  <circle cx="316" cy="60" r="26" fill="none" stroke="url(#accent6)" stroke-width="1.5"
    stroke-dasharray="40 124" stroke-dashoffset="-20" stroke-linecap="round"/>
  <!-- Checkmark -->
  <polyline points="305,60 312,67 327,52"
    fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- REMINDER label -->
  <text x="30" y="50"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11" font-weight="700" letter-spacing="5"
    fill="#78716c">REMINDER</text>

  <!-- Today wordmark -->
  <text x="28" y="90"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="46" font-weight="800"
    fill="url(#todaycolor6)" filter="url(#glow6)">Today</text>
</svg>

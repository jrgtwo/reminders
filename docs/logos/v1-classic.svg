<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" width="280" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800;900&amp;family=Inter:wght@600;700&amp;display=swap');
    </style>
  </defs>

  <!-- REMINDER label: tight tracked uppercase sans -->
  <text x="4" y="34"
    font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13" font-weight="700" letter-spacing="7"
    fill="#9ca3af">REMINDER</text>

  <!-- Today: heavy display serif -->
  <text x="0" y="90"
    font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
    font-size="72" font-weight="900"
    fill="#f9fafb">Today</text>
</svg>

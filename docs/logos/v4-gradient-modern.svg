<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="textgrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="linegrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="sh4">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#4c1d95" flood-opacity="0.4"/>
    </filter>
    <filter id="glow4">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#818cf8" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="6" y="6" width="348" height="108" rx="16" fill="url(#bg4)" filter="url(#sh4)"/>
  <rect x="6" y="6" width="348" height="108" rx="16" fill="none" stroke="#312e81" stroke-width="1"/>

  <!-- Decorative arc top-right -->
  <circle cx="330" cy="0" r="60" fill="none" stroke="#3730a3" stroke-width="1" opacity="0.4"/>
  <circle cx="330" cy="0" r="40" fill="none" stroke="#4338ca" stroke-width="0.5" opacity="0.3"/>

  <!-- REMINDER label -->
  <text x="30" y="52"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11" font-weight="700" letter-spacing="6"
    fill="#6366f1">REMINDER</text>

  <!-- Divider line -->
  <rect x="30" y="58" width="120" height="1.5" rx="1" fill="url(#linegrad4)" opacity="0.6"/>

  <!-- Today wordmark with gradient -->
  <text x="28" y="96"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="46" font-weight="900"
    fill="url(#textgrad4)" filter="url(#glow4)">Today</text>
</svg>

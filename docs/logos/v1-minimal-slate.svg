<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2333"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="sh1">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="6" y="6" width="348" height="108" rx="16" fill="url(#bg1)" filter="url(#sh1)"/>
  <rect x="6" y="6" width="348" height="108" rx="16" fill="none" stroke="#263147" stroke-width="1"/>

  <!-- Accent pill top-left -->
  <rect x="30" y="30" width="36" height="3" rx="1.5" fill="url(#accent1)"/>

  <!-- REMINDER label -->
  <text x="30" y="58"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11" font-weight="700" letter-spacing="6"
    fill="#64748b">REMINDER</text>

  <!-- Today wordmark -->
  <text x="28" y="94"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="46" font-weight="800"
    fill="#f8fafc">Today</text>

  <!-- Gradient dot -->
  <circle cx="208" cy="86" r="5" fill="url(#accent1)"/>
</svg>

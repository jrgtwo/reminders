<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120">
  <defs>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="sh3">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- White card -->
  <rect x="6" y="6" width="348" height="108" rx="16" fill="#ffffff" filter="url(#sh3)"/>
  <rect x="6" y="6" width="348" height="108" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="30" y="26" width="4" height="68" rx="2" fill="url(#accent3)"/>

  <!-- Calendar icon (right side) -->
  <g transform="translate(288, 28)" opacity="0.18">
    <rect x="0" y="8" width="42" height="36" rx="5" fill="#2563eb"/>
    <rect x="0" y="8" width="42" height="13" rx="5" fill="#1d4ed8"/>
    <rect x="10" y="2" width="5" height="11" rx="2.5" fill="#1d4ed8"/>
    <rect x="27" y="2" width="5" height="11" rx="2.5" fill="#1d4ed8"/>
    <rect x="8"  y="27" width="6" height="6" rx="2" fill="#fff"/>
    <rect x="18" y="27" width="6" height="6" rx="2" fill="#fff"/>
    <rect x="28" y="27" width="6" height="6" rx="2" fill="#fff"/>
    <rect x="8"  y="37" width="6" height="6" rx="2" fill="#fff"/>
    <rect x="18" y="37" width="6" height="6" rx="2" fill="#fff"/>
  </g>

  <!-- REMINDER label -->
  <text x="48" y="52"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11" font-weight="700" letter-spacing="5"
    fill="#94a3b8">REMINDER</text>

  <!-- Today wordmark -->
  <text x="46" y="90"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="44" font-weight="800"
    fill="#0f172a">Today</text>
</svg>
